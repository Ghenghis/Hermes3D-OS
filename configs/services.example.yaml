hermes:
  mode: local
  model_provider: openai_compatible
  model_base_url: http://127.0.0.1:1234/v1
  model_name: your-local-hermes-or-modeling-model

providers:
  minimax_mcp:
    provider: minimax
    model: minimax-mcp
    base_url: ${MINIMAX_MCP_URL}
    command: ${MINIMAX_MCP_COMMAND}
    vision: true
    multimodal_input: true
    evidence_required: true
  deepseek_v4:
    provider: deepseek
    model_family: deepseek-v4
    model: deepseek-v4-pro
    fallback_model: deepseek-v4-flash
    api_key: ${DEEPSEEK_API_KEY}
    base_url: ${DEEPSEEK_BASE_URL}
    allowed_for:
      - planning
      - code_generation
      - research_summaries
      - cadquery_reasoning
      - openscad_reasoning
      - roadmap_generation
      - markdown_report_generation
    vision: false
    vision_provider: minimax_mcp

vision:
  required_for_all_agents: true
  primary_provider: minimax_mcp
  additional_reasoning_provider: deepseek_v4
  deepseek_may_replace_vision: false
  image_input: true
  screenshot_analysis: true
  mesh_preview_analysis: true
  slicer_preview_analysis: true
  printer_camera_observation: true
  multimodal_evidence_summaries: true

workflow:
  engine: langgraph
  require_model_approval: true
  require_print_approval: true

database:
  url: sqlite:///./data/hermes3d.sqlite

workers:
  modeling:
    enabled: true
    provider: openai_compatible
    base_url: http://127.0.0.1:1234/v1
    model: your-downloaded-3d-modeling-llm
  generation_stack:
    enabled: true
    primary_engine: trellis2
    comparison_engine: hunyuan3d21
    fast_preview_engine: triposr
    require_printability_truth_gate: true
    comfyui:
      enabled: true
      base_url: http://127.0.0.1:8188
      workflow_dir: workflows/comfyui
      timeout_seconds: 30
      probe_timeout_seconds: 1
      generation_timeout_seconds: 600
    engines:
      trellis2:
        enabled: true
        workflow: workflows/comfyui/trellis2-image-to-3d.json
      hunyuan3d21:
        enabled: true
        workflow: workflows/comfyui/hunyuan3d-2.1-image-to-3d.json
      triposr:
        enabled: true
        workflow: workflows/comfyui/triposr-fast-preview.json
  cadquery:
    enabled: true
    executable: cadquery
  openscad:
    enabled: true
    executable: openscad
  blender:
    enabled: true
    executable: blender
  trimesh:
    enabled: true

speech:
  provider: azure
  azure:
    speech_key: ${AZURE_SPEECH_KEY}
    region: ${AZURE_SPEECH_REGION}
    default_voice: en-GB-MaisieNeural
    fallback_voice: en-US-JennyNeural
    output_format: audio-24khz-96kbitrate-mono-mp3
    enable_ssml: true
    enable_stt: true
    timeout_seconds: 30

agents:
  factory_operator:
    provider: minimax
    model: minimax-mcp
    vision: true
    multimodal_input: true
    evidence_required: true
    voice: en-GB-MaisieNeural
    role: Print factory narrator and operator guide
  modeling_agent:
    provider: deepseek
    model: deepseek-v4-pro
    fallback_model: deepseek-v4-flash
    vision: true
    vision_provider: minimax_mcp
    multimodal_input: true
    evidence_required: true
    voice: en-US-AriaNeural
    role: CAD/OpenSCAD/CadQuery reasoning and vision-backed modeling critique
  print_safety_agent:
    provider: minimax
    model: minimax-mcp
    vision: true
    multimodal_input: true
    evidence_required: true
    camera_required: true
    voice: en-AU-CarlyNeural
    role: Short safety alerts and warnings
  mesh_repair_agent:
    provider: minimax
    model: minimax-mcp
    vision: true
    multimodal_input: true
    evidence_required: true
    voice: en-US-AriaNeural
    role: Model validation, repair, and slicing updates
  mesh_qa_agent:
    provider: minimax
    model: minimax-mcp
    vision: true
    multimodal_input: true
    evidence_required: true
    voice: en-AU-CarlyNeural
    role: Mesh preview analysis, manifold evidence, repair proof, and visual QA
  slicer_qa_agent:
    provider: minimax
    model: minimax-mcp
    vision: true
    multimodal_input: true
    evidence_required: true
    voice: en-US-JennyNeural
    role: Slicer preview analysis, support risk, overhang review, and G-code evidence
  print_monitor_agent:
    provider: minimax
    model: minimax-mcp
    vision: true
    multimodal_input: true
    evidence_required: true
    camera_required: true
    voice: en-GB-RyanNeural
    role: Printer and camera observation, first-layer checks, and live print summaries
  research_agent:
    provider: deepseek
    model: deepseek-v4-pro
    fallback_model: deepseek-v4-flash
    vision: true
    vision_provider: minimax_mcp
    multimodal_input: true
    evidence_required: true
    voice: en-US-GuyNeural
    role: Idle learning reports and upgrade research
  privacy_agent:
    provider: deepseek
    model: deepseek-v4-pro
    fallback_model: deepseek-v4-flash
    vision: true
    vision_provider: minimax_mcp
    multimodal_input: true
    evidence_required: true
    voice: en-US-AvaNeural
    role: Anonymous mode, redaction, camera privacy, provider routing, and secrets policy

learning_mode:
  enabled: true
  cadence: on-idle-or-operator-triggered
  reports_dir: storage/learning
  hardware_policy:
    allow_printer_movement: false
    allow_s1_testing: false
    allow_upload_or_start: false
    redact_shareable_reports: true
    local_only_by_default: true
  queued_topics:
    - ai-3d-generation-watch
    - agentic-modeling-automation-watch
    - autonomous-cad-cam-watch
    - private-anonymous-os-watch
    - agentic-os-command-center-watch
    - generation-ux-provider-watch
    - tolerance-twin-calibration-watch
    - provenance-ledger-watch
    - printability-truth-gate-watch
    - observer-ai-watch
    - fleet-os-watch
    - printer-mods-watch

slicers:
  prusaslicer:
    enabled: true
    executable: prusa-slicer
  orcaslicer:
    enabled: false
    executable: orca-slicer

connectors:
  moonraker:
    dry_run: true
    timeout_seconds: 30
  fdm_monster:
    enabled: false
    base_url: http://127.0.0.1:4000
