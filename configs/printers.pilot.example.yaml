printers:
  - id: flsun-t1-a
    name: FLSUN T1-A
    vendor: FLSUN
    model: T1
    role: pilot
    connector: moonraker
    moonraker:
      base_url: http://192.168.0.10
      api_key_env: MOONRAKER_FLSUN_T1_A_API_KEY
    slicer_profile: profiles/prusaslicer/flsun-t1.ini
    capabilities:
      firmware: klipper
      input_shaping: true
      camera: unknown
      camera_url: ""
      heated_bed: true
      enclosure: unknown

  - id: flsun-t1-b
    name: FLSUN T1-B
    vendor: FLSUN
    model: T1
    role: pilot
    connector: moonraker
    moonraker:
      base_url: http://192.168.0.11
      api_key_env: MOONRAKER_FLSUN_T1_B_API_KEY
    slicer_profile: profiles/prusaslicer/flsun-t1.ini
    capabilities:
      firmware: klipper
      input_shaping: true
      camera: unknown
      camera_url: ""
      heated_bed: true
      enclosure: unknown

  - id: flsun-s1
    name: FLSUN S1
    vendor: FLSUN
    model: S1
    role: next-onboarding
    enabled: false
    connector: moonraker
    moonraker:
      base_url: http://192.168.0.12
      api_key_env: MOONRAKER_FLSUN_S1_API_KEY
    slicer_profile: profiles/prusaslicer/flsun-s1.ini
    capabilities:
      firmware: klipper
      input_shaping: true
      camera: unknown
      camera_url: ""
      heated_bed: true
      enclosure: unknown
      maintenance_lock: true
      do_not_probe: true
      known_online_ip: 192.168.0.12
      power_policy: turns_off_when_inactive
      lock_reason: "Maintenance lock: do not test or move. Movement may damage the hotend."

  - id: flsun-v400
    name: FLSUN V400
    vendor: FLSUN
    model: V400
    role: next-onboarding
    connector: moonraker
    moonraker:
      base_url: http://192.168.0.34
      alternate_base_urls:
        - http://192.168.0.36
        - http://192.168.1.146
      api_key_env: MOONRAKER_FLSUN_V400_API_KEY
    slicer_profile: profiles/prusaslicer/flsun-v400.ini
    capabilities:
      firmware: klipper
      input_shaping: true
      camera: unknown
      camera_url: ""
      heated_bed: true
      enclosure: unknown
