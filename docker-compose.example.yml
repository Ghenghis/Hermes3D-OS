services:
  api:
    image: hermes3d-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./configs:/app/configs
    ports:
      - "${HERMES3D_API_PORT:-8080}:${HERMES3D_API_PORT:-8080}"
    environment:
      HERMES3D_API_PORT: ${HERMES3D_API_PORT:-8080}
      HERMES3D_RUNTIME_CONFIG: /app/configs/runtime.local.yaml
